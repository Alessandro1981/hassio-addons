<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ETF Checker</title>
    <link rel="stylesheet" href="assets/style.css?v=0.4.19" />
  </head>
  <body data-ingress-root="{{ ingress_root }}">
    <main class="container">
      <header class="hero">
        <div>
          <p class="eyebrow">Home Assistant add-on</p>
          <h1>ETF Checker</h1>
          <p class="subtitle">Monitora ETF, prezzo di apertura, ultimo prezzo letto e alert sopra soglia.</p>
        </div>
      </header>

      <section class="panel">
        <div class="section-heading">
          <h2>Configurazione</h2>
          <span class="pill">Polling {{ poll_interval }}s</span>
        </div>
        <form id="config-form" class="form">
          <div class="field field-wide">
            <label for="symbols">Lista ETF</label>
            <textarea id="symbols" name="symbols" rows="4">{{ symbols }}</textarea>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="threshold">Soglia %</label>
              <input id="threshold" type="number" step="0.1" value="{{ threshold }}" />
            </div>

            <div class="field">
              <label for="market-open-retry">Ritardo apertura</label>
              <input id="market-open-retry" type="number" value="{{ market_open_retry_seconds }}" />
            </div>
          </div>

          <div class="field field-wide">
            <label for="notify_services">Notifiche</label>
            <select id="notify_services" multiple></select>
          </div>

          <div class="actions">
            <button type="submit" class="primary">Salva</button>
            <button type="button" id="poll-btn" class="secondary">Controlla ora</button>
          </div>
        </form>

        <p class="hint">Seleziona uno o più servizi notify.*</p>
        <p id="status" class="status"></p>
      </section>
    </main>

    <script>
      const ingressRoot = document.body.dataset.ingressRoot || "";
      const apiBase = ingressRoot ? `${ingressRoot}` : "";

      function buildUrl(path) {
        return apiBase ? `${apiBase}/${path}` : path;
      }

      async function loadNotifyServices() {
        const res = await fetch(buildUrl("api/notify-services"));
        const data = await res.json();
        const select = document.getElementById("notify_services");
        select.innerHTML = "";
        (data.services || []).forEach(svc => {
          const opt = document.createElement("option");
          opt.value = svc;
          opt.text = svc;
          select.appendChild(opt);
        });
      }

      document.getElementById("config-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const selected = Array.from(document.getElementById("notify_services").selectedOptions).map(o => o.value);

        await fetch(buildUrl("api/config"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            etf_symbols: document.getElementById("symbols").value,
            threshold_percent: document.getElementById("threshold").value,
            market_open_retry_seconds: document.getElementById("market-open-retry").value,
            notify_services: selected
          })
        });
      });

      loadNotifyServices();
    </script>
  </body>
</html>
