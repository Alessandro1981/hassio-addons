name: ETF Checker
version: "0.4.22"
slug: etf_checker
description: Monitora ETF e invia notifiche.
url: "https://github.com/Alessandro1981/etf-checker"
icon: icon.png
logo: logo.png
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386
ingress: true
ingress_port: 8099
panel_icon: mdi:chart-line
panel_title: ETF Checker
homeassistant_api: true
options:
  homeassistant_url: "http://supervisor/core"
  alpha_vantage_api_key: ""
  finnhub_api_key: ""
  poll_interval_seconds: 900
  default_threshold_percent: 2.0
