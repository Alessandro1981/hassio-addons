name: ETF Checker
version: "0.4.8"
slug: etf_checker
description: Monitora una lista di ETF e invia notifiche Companion quando viene superata una soglia percentuale.
url: "https://github.com/Alessandro1981/etf-checker"
icon: icon.png
logo: logo.png
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386
startup: services
boot: auto
build_from:
  amd64: ghcr.io/home-assistant/amd64-base:3.19
  aarch64: ghcr.io/home-assistant/aarch64-base:3.19
  armv7: ghcr.io/home-assistant/armv7-base:3.19
  armhf: ghcr.io/home-assistant/armhf-base:3.19
  i386: ghcr.io/home-assistant/i386-base:3.19
ingress: true
ingress_port: 8099
panel_icon: mdi:chart-line
panel_title: ETF Checker
homeassistant_api: false
ports:
  8099/tcp: null
options:
  homeassistant_url: "http://supervisor/core"
  homeassistant_token: ""
  notify_service: "notify/mobile_app_mio_telefono"
  alpha_vantage_api_key: ""
  finnhub_api_key: ""
  poll_interval_seconds: 900
  default_threshold_percent: 2.0
  log_level: "INFO"
schema:
  homeassistant_url: str
  homeassistant_token: password
  notify_service: str
  alpha_vantage_api_key: password
  finnhub_api_key: password
  poll_interval_seconds: int(60,86400)
  default_threshold_percent: float(0.1,50)
  log_level: list(DEBUG|INFO|WARNING|ERROR)
